name: Bug report
description: Report a problem with the integration
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please attach Home Assistant diagnostics. Check that credentials and tokens are redacted.
  - type: input
    id: ha
    attributes:
      label: Home Assistant version
    validations:
      required: true
  - type: input
    id: integration
    attributes:
      label: Integration version
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
